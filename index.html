<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PES Matches - eFootball Platform</title>
    <!-- Teko & Inter Fonts for a clean professional gaming look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Teko:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVBAR SECTION -->
    <header class="navbar">
        <!-- Clicking this opens your Facebook Group in a new tab -->
        <a href="https://facebook.com/groups/pesmatches" target="_blank" class="logo">
            PES <br><span>MATCHES</span>
        </a>

        <!-- Mobile-friendly Navigation Controls -->
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle Navigation">☰</button>
        <nav class="nav-links" id="navLinks">
            <a href="#" class="nav-item active" onclick="switchPage('home')">Home</a>
            <a href="#" class="nav-item" onclick="switchPage('guidelines')">Guidelines</a>
            <a href="#" class="nav-item" onclick="switchPage('registration')">Registration Here</a>
            <a href="#" class="nav-item" onclick="switchPage('dashboard')">Live Dashboard</a>
        </nav>
    </header>

    <main class="container">
        
        <!-- ==========================================
             HOME / DEFAULT VIEW (Circled in Red)
             ========================================== -->
        <section id="page-home" class="page-section active animate-fade">
            <div class="hero-wrapper">
                <div class="pill-badge">
                    <span>⚽</span> EFOOTBALL TOURNAMENT PLATFORM
                </div>
                
                <h1 class="hero-title">ENTER THE PITCH</h1>
                
                <p class="hero-subtitle">
                    Register for tournaments, validate your entry, and compete live
                </p>
                
                <button class="btn-primary" onclick="switchPage('registration')">
                    START REGISTRATION
                </button>
            </div>
        </section>

        <!-- ==========================================
             REPRESENTATIVE PAGES (Hidden until Selected)
             ========================================== -->
        <section id="page-guidelines" class="page-section glass-panel">
            <h2 class="section-title">Tournament Rules & Guidelines</h2>
            <!-- Your rules layout goes here -->
        </section>

        <section id="page-registration" class="page-section glass-panel">
            <h2 class="section-title">Tournament Registration</h2>
            <!-- Your form code layout goes here -->
        </section>

        <section id="page-dashboard" class="page-section glass-panel">
            <h2 class="section-title">Live Match Dashboard</h2>
            <!-- Your active tournament ladders / python hook lists go here -->
            <!-- Example: <!-- LEAGUE_150_HOOK --> -->
        </section>

    </main>

    <!-- UI Core Logic Script (Handles Mobile Menu & Page Switching seamlessly) -->
    <script>
        // Toggle mobile navigation menu expansion
        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');

        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('open');
            menuToggle.textContent = navLinks.classList.contains('open') ? '✕' : '☰';
        });

        // Dynamic page section router
        function switchPage(pageId) {
            // Close mobile navigation menu layout after choosing a selection
            navLinks.classList.remove('open');
            menuToggle.textContent = '☰';

            // Hide all active view panels
            document.querySelectorAll('.page-section').forEach(section => {
                section.classList.remove('active');
            });

            // Remove highlighted states on nav items
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });

            // Display selected target panel view
            const targetPage = document.getElementById(`page-${pageId}`);
            if (targetPage) {
                targetPage.classList.add('active');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            // Keep track of visually highlighted options in the top navigation bar
            const clickedLink = Array.from(document.querySelectorAll('.nav-item')).find(el => el.textContent.toLowerCase().includes(pageId === 'home' ? 'home' : pageId.substring(0,4)));
            if (clickedLink) clickedLink.classList.add('active');
        }
    </script>
</body>
</html>
