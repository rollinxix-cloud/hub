<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PES Matches - Premium eFootball Tournament Hosting Platform">
    <title>PES Matches — Enter The Pitch</title>
    
    <!-- Preconnect to optimize font delivery performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Teko:wght@600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- SITE HEADER & NAVIGATION -->
    <header class="navbar">
        <a href="https://facebook.com/groups/pesmatches" target="_blank" rel="noopener noreferrer" class="logo" aria-label="PES Matches Facebook Group">
            PES <br><span>MATCHES</span>
        </a>

        <button class="menu-toggle" id="menuToggle" aria-label="Toggle Navigation Menu" aria-expanded="false" aria-controls="navLinks">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>
        
        <nav class="nav-links" id="navLinks" aria-label="Main Directory">
            <a href="#" class="nav-item active" data-target="home" role="button">Home</a>
            <a href="#" class="nav-item" data-target="registration" role="button">Register Here</a>
        </nav>
    </header>

    <!-- MAIN INTERACTIVE CONTAINER -->
    <main class="container">
        
        <!-- SECTION: HOME VIEW (Strictly matching your red circle scope) -->
        <section id="page-home" class="page-section active" aria-live="polite">
            <div class="hero-wrapper">
                <div class="pill-badge">
                    <span aria-hidden="true">⚽</span> EFOOTBALL TOURNAMENT PLATFORM
                </div>
                <h1 class="hero-title">ENTER THE PITCH</h1>
                <p class="hero-subtitle">
                    Register for tournaments, validate your entry, and compete live with elite global operators.
                </p>
                <button class="btn-primary" type="button" id="heroRegisterBtn">
                    START REGISTRATION
                </button>
            </div>
        </section>

        <!-- SECTION: UPDATED REGISTRATION FORM -->
        <section id="page-registration" class="page-section" aria-live="polite">
            <div class="form-wrapper glass-panel">
                <div class="section-header">
                    <h2 class="section-title">Tournament Registration</h2>
                    <p class="section-desc">Submit your payment verification and player data details to secure your bracket slot.</p>
                </div>

                <form id="regForm" autocomplete="on">
                    <div class="form-grid">
                        <!-- Input Field: Name -->
                        <div class="form-group">
                            <label for="playerName">Name</label>
                            <input type="text" id="playerName" name="username" placeholder="Your full name or in-game nickname" required maxlength="60">
                        </div>
                        
                        <!-- Input Field: Facebook Link -->
                        <div class="form-group">
                            <label for="fbLink">Facebook Link</label>
                            <input type="url" id="fbLink" name="facebook_url" placeholder="e.g., https://facebook.com/username" required>
                        </div>
                        
                        <!-- Input Field: Tournament Type -->
                        <div class="form-group">
                            <label for="tournamentType">Tournament Type</label>
                            <div class="select-wrapper">
                                <select id="tournamentType" name="tournament_type" required>
                                    <option value="" disabled selected>Select tournament style</option>
                                    <option value="solo_1v1">Solo 1v1 Bracket</option>
                                    <option value="coop_2v2">Co-Op 2v2 Bracket</option>
                                    <option value="elite_league">Elite League Division</option>
                                </select>
                            </div>
                        </div>
                        
                        <!-- Input Field: Amount -->
                        <div class="form-group">
                            <label for="payAmount">Amount</label>
                            <input type="text" id="payAmount" name="amount" placeholder="e.g., Rs. 150" required>
                        </div>
                        
                        <!-- Input Field: Esewa or Khalti Dropdown Selector -->
                        <div class="form-group">
                            <label for="paymentMethod">Esewa or Khalti</label>
                            <div class="select-wrapper">
                                <select id="paymentMethod" name="payment_gateway" required>
                                    <option value="" disabled selected>Select payment wallet</option>
                                    <option value="esewa">eSewa Wallet</option>
                                    <option value="khalti">Khalti Wallet</option>
                                </select>
                            </div>
                        </div>
                        
                        <!-- Input Field: Transaction Code -->
                        <div class="form-group">
                            <label for="txCode">Transaction Code</label>
                            <input type="text" id="txCode" name="transaction_code" placeholder="Enter your transaction reference ID" required>
                        </div>
                    </div>

                    <div class="submit-action-row">
                        <button type="submit" class="btn-primary form-submit-btn">Register</button>
                    </div>
                </form>
            </div>
        </section>

    </main>

    <!-- DYNAMIC ROUTER CONTROLLER SCRIPT -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const menuToggle = document.getElementById('menuToggle');
            const navLinks = document.getElementById('navLinks');
            const navItems = document.querySelectorAll('.nav-item');
            const sections = document.querySelectorAll('.page-section');
            const heroRegisterBtn = document.getElementById('heroRegisterBtn');

            // Responsive Mobile Open/Close Toggle
            const toggleMenu = () => {
                const isExpanded = menuToggle.getAttribute('aria-expanded') === 'true';
                menuToggle.setAttribute('aria-expanded', !isExpanded);
                navLinks.classList.toggle('open');
                menuToggle.classList.toggle('active');
            };

            menuToggle.addEventListener('click', toggleMenu);

            // Page Routing Engine Fixes (Eliminates layout tracking gaps completely)
            const switchView = (targetPageId) => {
                // Instantly clean active nav text styles
                navItems.forEach(link => {
                    link.classList.remove('active');
                    if(link.getAttribute('data-target') === targetPageId) {
                        link.classList.add('active');
                    }
                });

                // Clear layout view elements
                sections.forEach(section => {
                    section.classList.remove('active');
                    if(section.id === `page-${targetPageId}`) {
                        section.classList.add('active');
                    }
                });

                // Smooth snapping to topmost coordinates
                window.scrollTo({ top: 0, behavior: 'auto' });
            };

            navItems.forEach(item => {
                item.addEventListener('click', (e) => {
                    e.preventDefault();
                    const targetPage = item.getAttribute('data-target');
                    if(navLinks.classList.contains('open')) toggleMenu();
                    switchView(targetPage);
                });
            });

            // Connect Home Page Main CTA button cleanly
            if(heroRegisterBtn) {
                heroRegisterBtn.addEventListener('click', () => {
                    switchView('registration');
                });
            }
        });
    </script>
</body>
</html>
